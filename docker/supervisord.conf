[supervisord]
nodaemon=true
logfile=/tmp/supervisord.log
pidfile=/tmp/supervisord.pid

[unix_http_server]
file=/tmp/supervisor.sock

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:xvfb]
command=Xvfb :1 -screen 0 1920x1080x24 -ac
autorestart=true
priority=10

[program:fluxbox]
command=fluxbox
environment=DISPLAY=":1"
autorestart=true
priority=20

[program:x11vnc]
command=x11vnc -display :1 -forever -shared -nopw -rfbport 5900
autorestart=true
priority=30

[program:websockify]
command=websockify --web /opt/noVNC 6080 localhost:5900
autorestart=true
priority=40
